name: armory

on: [push]

jobs:
  validate:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v3
      - uses: actions/checkout@v3
        with:
          repository: deepsourcecorp/armory
          ref: master
          token: ${{ secrets.DS_ARMORY_TOKEN }}
          path: .github/actions/armory
      - name: Run Armory
        uses: ./.github/actions/armory
